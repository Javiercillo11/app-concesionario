<mat-card *ngIf="vehicle">
  <mat-card-header>
    <mat-card-title>{{vehicle.brand}} {{vehicle.model}}</mat-card-title>
    <mat-card-subtitle>Año: {{vehicle.year}}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p>{{vehicle.description}}</p>
    <p><strong>Precio:</strong> ${{vehicle.price}}</p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button color="primary" routerLink="/vehicles">Volver</button>
  </mat-card-actions>
</mat-card>
